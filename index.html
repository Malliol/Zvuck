<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Toggle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      gap: 32px;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .label {
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: #555;
      transition: color 0.3s;
      min-width: 40px;
    }

    .label.active { color: #00e5ff; }

    input[type="checkbox"] { display: none; }

    .switch {
      position: relative;
      width: 90px;
      height: 44px;
      cursor: pointer;
    }

    .track {
      position: absolute;
      inset: 0;
      background: #222;
      border-radius: 22px;
      border: 2px solid #333;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    .knob {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 30px;
      height: 30px;
      background: #444;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.3s, box-shadow 0.3s;
    }

    input:checked + .switch .track {
      background: #003d4d;
      border-color: #00e5ff;
      box-shadow: 0 0 18px #00e5ff55;
    }

    input:checked + .switch .knob {
      transform: translateX(46px);
      background: #00e5ff;
      box-shadow: 0 0 10px #00e5ffaa;
    }

    .status {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: #444;
      transition: color 0.3s;
    }

    .status.on { color: #00e5ff; }

    /* Visualizer */
    .bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 40px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .bars.visible { opacity: 1; }

    .bar {
      width: 6px;
      background: #00e5ff;
      border-radius: 3px 3px 0 0;
      animation: none;
    }

    .bars.visible .bar { animation: bounce var(--d) ease-in-out infinite alternate; }

    @keyframes bounce {
      from { height: 4px; }
      to   { height: var(--h); }
    }
  </style>
</head>
<body>

  <h1>Sound Toggle</h1>

  <div class="toggle-wrap">
    <span class="label" id="offLabel">OFF</span>
    <label>
      <input type="checkbox" id="toggle" />
      <div class="switch">
        <div class="track"></div>
        <div class="knob"></div>
      </div>
    </label>
    <span class="label" id="onLabel">ON</span>
  </div>

  <div class="status" id="status">нажми тумблер</div>

  <div class="bars" id="bars">
    <div class="bar" style="--d:.6s;--h:28px"></div>
    <div class="bar" style="--d:.4s;--h:36px"></div>
    <div class="bar" style="--d:.7s;--h:20px"></div>
    <div class="bar" style="--d:.5s;--h:40px"></div>
    <div class="bar" style="--d:.3s;--h:24px"></div>
    <div class="bar" style="--d:.8s;--h:32px"></div>
    <div class="bar" style="--d:.45s;--h:18px"></div>
  </div>

  <script>
    const toggle = document.getElementById('toggle');
    const status = document.getElementById('status');
    const bars   = document.getElementById('bars');
    const onLabel  = document.getElementById('onLabel');
    const offLabel = document.getElementById('offLabel');

    let ctx, oscillator, gainNode;

    function startSound() {
      ctx = new (window.AudioContext || window.webkitAudioContext)();

      gainNode = ctx.createGain();
      gainNode.gain.setValueAtTime(0, ctx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.3);
      gainNode.connect(ctx.destination);

      oscillator = ctx.createOscillator();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(110, ctx.currentTime);
      oscillator.connect(gainNode);
      oscillator.start();
    }

    function stopSound() {
      if (!ctx) return;
      gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
      setTimeout(() => { ctx.close(); ctx = null; }, 350);
    }

    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        startSound();
        status.textContent = 'играет...';
        status.classList.add('on');
        bars.classList.add('visible');
        onLabel.classList.add('active');
        offLabel.classList.remove('active');
      } else {
        stopSound();
        status.textContent = 'выключено';
        status.classList.remove('on');
        bars.classList.remove('visible');
        onLabel.classList.remove('active');
        offLabel.classList.add('active');
      }
    });
  </script>
</body>
</html>
