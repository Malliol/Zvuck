<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ОСГО СИРЕНА</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      color: #111;
      gap: 36px;
    }

    h1 {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      font-weight: 600;
      color: #111;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .label {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ccc;
      transition: color 0.25s;
      min-width: 36px;
    }

    #offLabel.active { color: #e53935; }
    #onLabel.active  { color: #43a047; }

    input[type="checkbox"] { display: none; }

    .switch {
      position: relative;
      width: 88px;
      height: 44px;
      cursor: pointer;
    }

    .track {
      position: absolute;
      inset: 0;
      background: #f0f0f0;
      border-radius: 22px;
      border: 2px solid #ddd;
      transition: background 0.25s, border-color 0.25s;
    }

    .knob {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 30px;
      height: 30px;
      background: #e53935;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.25s;
    }

    input:checked + .switch .track {
      background: #f0f0f0;
      border-color: #43a047;
    }

    input:checked + .switch .knob {
      transform: translateX(44px);
      background: #43a047;
    }

    .status {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: #bbb;
      transition: color 0.25s;
    }

    .status.on { color: #43a047; }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 40px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .bars.visible { opacity: 1; }

    .bar {
      width: 6px;
      background: #43a047;
      border-radius: 2px 2px 0 0;
      height: 4px;
    }

    .bars.visible .bar {
      animation: bounce var(--d) ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from { height: 4px; }
      to   { height: var(--h); }
    }
  </style>
</head>
<body>

  <h1>ОСГО СИРЕНА</h1>

  <div class="toggle-wrap">
    <span class="label active" id="offLabel">OFF</span>
    <label>
      <input type="checkbox" id="toggle" />
      <div class="switch">
        <div class="track"></div>
        <div class="knob"></div>
      </div>
    </label>
    <span class="label" id="onLabel">ON</span>
  </div>

  <div class="status" id="status">нажми тумблер</div>

  <div class="bars" id="bars">
    <div class="bar" style="--d:.5s;--h:24px"></div>
    <div class="bar" style="--d:.35s;--h:38px"></div>
    <div class="bar" style="--d:.65s;--h:18px"></div>
    <div class="bar" style="--d:.45s;--h:40px"></div>
    <div class="bar" style="--d:.3s;--h:22px"></div>
    <div class="bar" style="--d:.7s;--h:34px"></div>
    <div class="bar" style="--d:.4s;--h:16px"></div>
  </div>

  <script>
    const toggle  = document.getElementById('toggle');
    const status  = document.getElementById('status');
    const bars    = document.getElementById('bars');
    const onLabel  = document.getElementById('onLabel');
    const offLabel = document.getElementById('offLabel');

    let ctx, osc, gain, lfo;

    function startSiren() {
      ctx  = new (window.AudioContext || window.webkitAudioContext)();

      gain = ctx.createGain();
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.2);
      gain.connect(ctx.destination);

      osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = 600;
      osc.connect(gain);

      lfo = ctx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.8;

      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 350;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);

      lfo.start();
      osc.start();
    }

    function stopSiren() {
      if (!ctx) return;
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
      setTimeout(() => { ctx.close(); ctx = null; }, 300);
    }

    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        startSiren();
        status.textContent = 'сирена активна';
        status.classList.add('on');
        bars.classList.add('visible');
        onLabel.classList.add('active');
        offLabel.classList.remove('active');
      } else {
        stopSiren();
        status.textContent = 'выключено';
        status.classList.remove('on');
        bars.classList.remove('visible');
        onLabel.classList.remove('active');
        offLabel.classList.add('active');
      }
    });
  </script>
</body>
</html>
