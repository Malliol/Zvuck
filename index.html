<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ОСГО СИРЕНА</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      color: #111;
      gap: 36px;
    }

    h1 {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      font-weight: 600;
      color: #111;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .label {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ccc;
      transition: color 0.25s;
      min-width: 36px;
    }

    #offLabel.active { color: #e53935; }
    #onLabel.active  { color: #43a047; }

    input[type="checkbox"] { display: none; }

    .switch {
      position: relative;
      width: 88px;
      height: 44px;
      cursor: pointer;
    }

    .track {
      position: absolute;
      inset: 0;
      background: #f0f0f0;
      border-radius: 22px;
      border: 2px solid #ddd;
      transition: background 0.25s, border-color 0.25s;
    }

    .knob {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 30px;
      height: 30px;
      background: #e53935;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.25s;
    }

    input:checked + .switch .track {
      background: #f0f0f0;
      border-color: #43a047;
    }

    input:checked + .switch .knob {
      transform: translateX(44px);
      background: #43a047;
    }

    .status {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: #bbb;
      transition: color 0.25s;
    }

    .status.on { color: #43a047; }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 40px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .bars.visible { opacity: 1; }

    .bar {
      width: 6px;
      background: #43a047;
      border-radius: 2px 2px 0 0;
      height: 4px;
    }

    .bars.visible .bar {
      animation: bounce var(--d) ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from { height: 4px; }
      to   { height: var(--h); }
    }

    .mode-selector {
      display: flex;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    .mode-btn {
      padding: 7px 14px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      background: #fff;
      border: none;
      border-right: 1.5px solid #ddd;
      color: #aaa;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .mode-btn:last-child { border-right: none; }
    .mode-btn.active { background: #111; color: #fff; }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
      display: inline-block;
      margin-right: 6px;
    }

    .sync-dot.connected { background: #43a047; }

    .sync-status {
      font-size: 0.7rem;
      color: #bbb;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

  <h1>ОСГО СИРЕНА</h1>

  <div class="toggle-wrap">
    <span class="label active" id="offLabel">OFF</span>
    <label>
      <input type="checkbox" id="toggle" />
      <div class="switch">
        <div class="track"></div>
        <div class="knob"></div>
      </div>
    </label>
    <span class="label" id="onLabel">ON</span>
  </div>

  <div class="status" id="status">нажми тумблер</div>

  <div class="bars" id="bars">
    <div class="bar" style="--d:.5s;--h:24px"></div>
    <div class="bar" style="--d:.35s;--h:38px"></div>
    <div class="bar" style="--d:.65s;--h:18px"></div>
    <div class="bar" style="--d:.45s;--h:40px"></div>
    <div class="bar" style="--d:.3s;--h:22px"></div>
    <div class="bar" style="--d:.7s;--h:34px"></div>
    <div class="bar" style="--d:.4s;--h:16px"></div>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active" data-mode="siren">1 Сирена</button>
    <button class="mode-btn" data-mode="doom">2 Дум</button>
    <button class="mode-btn" data-mode="pew">3 Пиу пиу</button>
  </div>

  <div class="sync-status">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncLabel">подключение...</span>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHvEEtwfa4OGbRCCwfyylMiPd90YcFbZ4",
      authDomain: "flutter-ai-playground-ccfb8.firebaseapp.com",
      databaseURL: "https://flutter-ai-playground-ccfb8-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "flutter-ai-playground-ccfb8",
      storageBucket: "flutter-ai-playground-ccfb8.firebasestorage.app",
      messagingSenderId: "1066476650880",
      appId: "1:1066476650880:web:c4aa179a096eddcfd6c165"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const stateRef = ref(db, 'siren/state');

    // ── UI refs ──
    const toggle   = document.getElementById('toggle');
    const statusEl = document.getElementById('status');
    const bars     = document.getElementById('bars');
    const onLabel  = document.getElementById('onLabel');
    const offLabel = document.getElementById('offLabel');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const syncDot  = document.getElementById('syncDot');
    const syncLabel = document.getElementById('syncLabel');

    let currentMode = 'siren';
    let ctx = null;
    let stopFn = null;
    let ignoreNextChange = false; // prevent feedback loop

    // ── Sound engines ──
    function startSiren(c) {
      const gain = c.createGain();
      gain.gain.setValueAtTime(0, c.currentTime);
      gain.gain.linearRampToValueAtTime(0.4, c.currentTime + 0.2);
      gain.connect(c.destination);
      const osc = c.createOscillator();
      osc.type = 'sawtooth'; osc.frequency.value = 600; osc.connect(gain);
      const lfo = c.createOscillator();
      lfo.type = 'sine'; lfo.frequency.value = 0.8;
      const lfoGain = c.createGain(); lfoGain.gain.value = 350;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start(); osc.start();
      return () => { gain.gain.linearRampToValueAtTime(0, c.currentTime + 0.25); };
    }

    const doomNotes = [
      [164.81,.12,.03],[164.81,.12,.03],[130.81,.12,.03],[164.81,.18,.06],
      [196.00,.12,.03],[174.61,.12,.03],[155.56,.12,.03],[130.81,.12,.03],
      [164.81,.12,.03],[196.00,.12,.03],[220.00,.18,.06],[196.00,.12,.03],
      [174.61,.12,.03],[164.81,.18,.10],
    ];

    function startDoom(c) {
      const master = c.createGain(); master.gain.value = 0.35; master.connect(c.destination);
      let alive = true;
      function playRiff() {
        if (!alive) return;
        let t = c.currentTime + 0.05;
        doomNotes.forEach(([freq, dur, gap]) => {
          const g = c.createGain();
          g.gain.setValueAtTime(0.8, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
          g.connect(master);
          const o = c.createOscillator(); o.type = 'square'; o.frequency.value = freq;
          o.connect(g); o.start(t); o.stop(t + dur);
          t += dur + gap;
        });
        const total = doomNotes.reduce((s,[,d,g]) => s+d+g, 0);
        setTimeout(() => playRiff(), total * 1000 + 50);
      }
      playRiff();
      return () => { alive = false; master.gain.linearRampToValueAtTime(0, c.currentTime + 0.2); };
    }

    function startPew(c) {
      const master = c.createGain(); master.gain.value = 0.5; master.connect(c.destination);
      let alive = true;
      function pew() {
        if (!alive) return;
        const g = c.createGain();
        g.gain.setValueAtTime(0.6, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.25);
        g.connect(master);
        const o = c.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(1200, c.currentTime);
        o.frequency.exponentialRampToValueAtTime(200, c.currentTime + 0.25);
        o.connect(g); o.start(); o.stop(c.currentTime + 0.26);
        setTimeout(() => pew(), 350);
      }
      pew();
      return () => { alive = false; master.gain.linearRampToValueAtTime(0, c.currentTime + 0.15); };
    }

    const starters = { siren: startSiren, doom: startDoom, pew: startPew };
    const labels   = { siren: 'сирена активна', doom: 'дум играет', pew: 'пиу пиу пиу...' };

    function startSound() {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      stopFn = starters[currentMode](ctx);
    }

    function stopSound() {
      if (!ctx) return;
      if (stopFn) stopFn();
      stopFn = null;
      setTimeout(() => { if (ctx) { ctx.close(); ctx = null; } }, 350);
    }

    function applyState(on) {
      toggle.checked = on;
      if (on) {
        if (!ctx) startSound();
        statusEl.textContent = labels[currentMode];
        statusEl.classList.add('on');
        bars.classList.add('visible');
        onLabel.classList.add('active');
        offLabel.classList.remove('active');
      } else {
        stopSound();
        statusEl.textContent = 'выключено';
        statusEl.classList.remove('on');
        bars.classList.remove('visible');
        onLabel.classList.remove('active');
        offLabel.classList.add('active');
      }
    }

    // ── Firebase listener (remote changes) ──
    onValue(stateRef, (snapshot) => {
      syncDot.classList.add('connected');
      syncLabel.textContent = 'синхронизировано';

      const data = snapshot.val();
      if (data === null) return;

      const on   = data.on;
      const mode = data.mode || 'siren';

      // sync mode buttons
      if (mode !== currentMode) {
        currentMode = mode;
        modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      }

      // apply toggle only if state differs (avoid loop)
      if (on !== toggle.checked) {
        ignoreNextChange = true;
        applyState(on);
      }
    }, (err) => {
      syncLabel.textContent = 'ошибка связи';
    });

    // ── Local toggle → write to Firebase ──
    toggle.addEventListener('change', () => {
      if (ignoreNextChange) { ignoreNextChange = false; return; }
      set(stateRef, { on: toggle.checked, mode: currentMode });
    });

    // ── Mode buttons ──
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        if (toggle.checked) {
          stopSound();
          setTimeout(() => {
            startSound();
            statusEl.textContent = labels[currentMode];
          }, 400);
        }
        // sync mode to Firebase
        set(stateRef, { on: toggle.checked, mode: currentMode });
      });
    });
  </script>
</body>
</html>
